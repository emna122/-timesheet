version: '3.8'
services:
  mysql:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: Esprit2024
      MYSQL_DATABASE: timesheet
    volumes:
      - timesheetvol:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pEsprit2024"]
      interval: 10s
      timeout: 5s
      retries: 10
  timesheet:
    image: timesheet-emnabelhajali-2alinfo1
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/timesheet?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Esprit2024
volumes:
  timesheetvol:
